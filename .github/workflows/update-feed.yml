name: Update Package Feed

on:
  repository_dispatch:
    types: [webhook-release]
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository (owner/repo)'
        required: true
        type: string
      tag:
        description: 'Tag (leave empty for latest release)'
        required: false
        type: string

permissions:
  contents: write

env:
  MKHASH: "mkhash"

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine repository and tag
        id: source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_REPOSITORY: ${{ inputs.repository }}
          INPUT_TAG: ${{ inputs.tag }}
          PAYLOAD_REPOSITORY: ${{ github.event.client_payload.repository }}
          PAYLOAD_TAG: ${{ github.event.client_payload.tag }}
        run: |
          # Priority: workflow_dispatch inputs > repository_dispatch payload
          if [[ -n "$INPUT_REPOSITORY" ]]; then
            REPO="$INPUT_REPOSITORY"
            TAG="$INPUT_TAG"

            # If no tag provided, fetch latest release
            if [[ -z "$TAG" ]]; then
              echo "Fetching latest release for ${REPO}..."
              TAG=$(gh release view --repo "$REPO" --json tagName -q '.tagName') || {
                echo "::error::Failed to get latest release for ${REPO}"
                exit 1
              }
              echo "Latest release tag: ${TAG}"
            fi
          else
            REPO="$PAYLOAD_REPOSITORY"
            TAG="$PAYLOAD_TAG"
          fi

          # Validate
          if [[ -z "$REPO" ]]; then
            echo "::error::Missing repository"
            exit 1
          fi
          if [[ -z "$TAG" ]]; then
            echo "::error::Missing tag"
            exit 1
          fi

          echo "repository=${REPO}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Processing release: ${REPO}@${TAG}"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/incoming
          cd /tmp/incoming

          REPO="${{ steps.source.outputs.repository }}"
          TAG="${{ steps.source.outputs.tag }}"

          echo "Downloading assets from ${REPO}@${TAG}"

          # Download all .ipk files from the release (OpenWRT <= 24.10)
          gh release download "${TAG}" \
            --repo "${REPO}" \
            --pattern "*.ipk" \
            --dir . \
            2>/dev/null || true

          # Download all .apk files from the release (OpenWRT >= 25.12)
          gh release download "${TAG}" \
            --repo "${REPO}" \
            --pattern "*.apk" \
            --dir . \
            2>/dev/null || true

          # List downloaded files
          echo "Downloaded files:"
          ls -la *.ipk *.apk 2>/dev/null || echo "No package files found"

          # Count files
          IPK_COUNT=$(ls -1 *.ipk 2>/dev/null | wc -l || echo 0)
          APK_COUNT=$(ls -1 *.apk 2>/dev/null | wc -l || echo 0)
          TOTAL_COUNT=$((IPK_COUNT + APK_COUNT))

          if [ "$TOTAL_COUNT" -eq 0 ]; then
            echo "::warning::No package files found in release"
            echo "NO_PACKAGES=true" >> $GITHUB_ENV
          else
            echo "Found ${IPK_COUNT} .ipk file(s) and ${APK_COUNT} .apk file(s)"
          fi

      - name: Setup signing keys
        if: env.NO_PACKAGES != 'true'
        env:
          USIGN_SECRET: ${{ secrets.USIGN_SECRET }}
          APK_SIGN_KEY: ${{ secrets.APK_SIGN_KEY }}
        run: |
          if [[ -n "$USIGN_SECRET" ]]; then
            echo "$USIGN_SECRET" > /tmp/usign.secret
            chmod 600 /tmp/usign.secret
            echo "USIGN_KEY_AVAILABLE=true" >> $GITHUB_ENV
          fi

          if [[ -n "$APK_SIGN_KEY" ]]; then
            echo "$APK_SIGN_KEY" > /tmp/Zerogiven_Feed.rsa
            chmod 600 /tmp/Zerogiven_Feed.rsa
            echo "APK_KEY_AVAILABLE=true" >> $GITHUB_ENV
          fi

      - name: Sync packages
        if: env.NO_PACKAGES != 'true'
        run: |
          chmod +x .scripts/sync-packages.sh
          .scripts/sync-packages.sh /tmp/incoming

      - name: Regenerate indices and sign
        if: env.NO_PACKAGES != 'true'
        run: |
          chmod +x .scripts/make-index-and-sign.sh
          chmod +x .scripts/ipkg-make-index.sh
          chmod +x .scripts/apk-make-index.sh
          chmod +x .scripts/apk-sign.sh

          # Add .scripts to PATH for usign, mkhash, and helper scripts
          export PATH="${PWD}/.scripts:${PATH}"

          USIGN_FLAG=""
          if [[ "${USIGN_KEY_AVAILABLE:-}" == "true" ]]; then
            USIGN_FLAG="-s /tmp/usign.secret"
          fi

          APK_KEY_FLAG=""
          if [[ "${APK_KEY_AVAILABLE:-}" == "true" ]]; then
            APK_KEY_FLAG="-k /tmp/Zerogiven_Feed.rsa"
          fi

          .scripts/make-index-and-sign.sh $USIGN_FLAG $APK_KEY_FLAG .

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f /tmp/usign.secret /tmp/Zerogiven_Feed.rsa

      - name: Commit and push changes
        if: env.NO_PACKAGES != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add all changes
          git add -A

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Create commit message
          REPO="${{ steps.source.outputs.repository }}"
          TAG="${{ steps.source.outputs.tag }}"

          git commit -m "$(cat <<EOF
          Update packages from ${REPO}@${TAG}

          Triggered by ${{ github.event_name }} event.

          Source: ${REPO}
          Tag: ${TAG}
          EOF
          )"

          # Push with retry logic
          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin main; then
              echo "Push successful"
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done

          echo "::error::Failed to push after 3 attempts"
          exit 1
